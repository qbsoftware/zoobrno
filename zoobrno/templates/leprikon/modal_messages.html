{% load i18n %}

{% for message in messages %}
<div class="article">
<div class="alert alert-dismissible {% if message.level_tag == 'error' %}zvyrazneni{% else %}zvyrazneni_blue{% endif %}" role="alert">
    <span class="glyphicon glyphicon-{% if message.level_tag == 'error' %}exclamation{% else %}{{ message.level_tag }}{% endif %}-sign" aria-hidden="true"></span>
    {{ message }}
    <button type="button" class="close" data-dismiss="alert" aria-label="{% trans 'Close' %}">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
</div>
{% endfor %}
